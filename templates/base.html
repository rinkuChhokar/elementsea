<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Elementsea — Explore all 118 elements of the periodic table with an interactive, modern interface.">
  <title>{% block title %}Elementsea{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-mesh">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <!-- Navigation -->
  <nav class="es-nav">
    <a href="/" class="es-nav-brand">⚗️ Elementsea</a>

    <div class="es-nav-search">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.156a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
      </svg>
      <input type="text" id="globalSearch" placeholder="Search elements..." autocomplete="off">
    </div>

    {% block nav_extra %}
    <a href="/" class="es-nav-home">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5v-4h3v4H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L8.354 1.146z"/>
      </svg>
      Home
    </a>
    {% endblock %}
  </nav>

  <!-- Main Content -->
  <main class="es-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="es-footer">
    <p>Built with ❤️ by <span>Elementsea</span> &nbsp;·&nbsp; All 118 elements of the periodic table</p>
  </footer>

  <script>
    // Global search — works on both home and detail pages
    const globalSearch = document.getElementById('globalSearch');
    if (globalSearch) {
      globalSearch.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        // If we have tiles on the page, filter them
        const tiles = document.querySelectorAll('.es-tile[data-name]');
        if (tiles.length) {
          let found = 0;
          tiles.forEach(t => {
            const name = t.dataset.name || '';
            const sym  = t.dataset.symbol || '';
            const num  = t.dataset.number || '';
            const match = !q || name.includes(q) || sym.includes(q) || num.includes(q);
            if (match) { t.classList.remove('dimmed'); t.classList.add('highlighted'); found++; }
            else { t.classList.add('dimmed'); t.classList.remove('highlighted'); }
          });
          if (!q) tiles.forEach(t => { t.classList.remove('dimmed','highlighted'); });
        } else if (q) {
          // Navigate from detail page
          window.location.href = '/?q=' + encodeURIComponent(q);
        }
      });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
